<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLEARSHOT RAW</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #0b0c0b;
      --bg-2: #121412;
      --bg-3: #181b19;
      --bg-4: #202521;

      --cream: #f4efe6;
      --soft-cream: rgba(244, 239, 230, 0.82);
      --muted-cream: rgba(244, 239, 230, 0.56);

      --sage: #a8b4a3;
      --sage-soft: rgba(168, 180, 163, 0.12);

      --glass: rgba(255, 255, 255, 0.08);
      --glass-strong: rgba(255, 255, 255, 0.11);
      --glass-line: rgba(255, 255, 255, 0.18);
      --shadow: rgba(0, 0, 0, 0.28);

      --mx: 50%;
      --my: 50%;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: "Inter", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 16% 22%, rgba(244, 239, 230, 0.09), transparent 22%),
        radial-gradient(circle at 30% 70%, rgba(244, 239, 230, 0.05), transparent 20%),
        radial-gradient(circle at 82% 78%, rgba(168, 180, 163, 0.10), transparent 22%),
        radial-gradient(circle at 78% 22%, rgba(255, 255, 255, 0.06), transparent 16%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 28%, var(--bg-3) 68%, var(--bg-4) 100%);
      position: relative;
      isolation: isolate;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ambient {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
      z-index: 0;
    }

    .ambient.a1 {
      width: 26rem;
      height: 26rem;
      top: -9rem;
      left: -7rem;
      background: rgba(244, 239, 230, 0.07);
    }

    .ambient.a2 {
      width: 22rem;
      height: 22rem;
      right: -6rem;
      bottom: -7rem;
      background: rgba(168, 180, 163, 0.12);
    }

    .ambient.a3 {
      width: 18rem;
      height: 18rem;
      right: 10rem;
      top: 3rem;
      background: rgba(255, 255, 255, 0.03);
      filter: blur(80px);
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
      z-index: 0;
    }

    .orb.o1 {
      width: 13rem;
      height: 13rem;
      top: -3rem;
      right: 6rem;
      opacity: 0.3;
    }

    .orb.o2 {
      width: 9rem;
      height: 9rem;
      bottom: 4rem;
      right: 9rem;
      opacity: 0.2;
    }

    .orb.o3 {
      width: 7rem;
      height: 7rem;
      left: -1rem;
      bottom: 3rem;
      opacity: 0.14;
      background: rgba(168, 180, 163, 0.06);
    }

    .hero {
      position: relative;
      z-index: 1;
      width: min(100%, 72rem);
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-inner {
      width: 100%;
      max-width: 62rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted-cream);
      margin-bottom: 1.25rem;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.15rem;
    }

    .brand-main {
      font-size: clamp(3.2rem, 8vw, 6.4rem);
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.055em;
      color: var(--cream);
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.1);
    }

    .raw-glass {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 1.12em;
      padding: 0.12em 0.36em 0.16em;
      border-radius: 0.34em;
      overflow: hidden;
      color: rgba(244, 239, 230, 0.97);
      font-size: clamp(3rem, 7vw, 5.8rem);
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.055em;
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.05));
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -1px 0 rgba(255,255,255,0.04),
        0 18px 40px rgba(0,0,0,0.20);
    }

    .tagline {
      font-size: clamp(1.04rem, 1.9vw, 1.35rem);
      line-height: 1.35;
      color: var(--soft-cream);
      font-weight: 500;
      letter-spacing: -0.01em;
      text-align: center;
      margin-bottom: 2rem;
      font-family: "Inter", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .button-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.85rem;
      margin-bottom: 1.7rem;
    }

    .glass-btn,
    .solid-btn {
      appearance: none;
      border: none;
      outline: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 8.4rem;
      padding: 0.95rem 1.35rem;
      border-radius: 999px;
      font-size: 0.97rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-align: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 14px 34px rgba(0,0,0,0.14);
      transition:
        transform 0.22s ease,
        opacity 0.22s ease,
        box-shadow 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease;
      text-decoration: none;
    }

    .glass-btn {
      color: rgba(244, 239, 230, 0.92);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .solid-btn {
      color: #171817;
      background: rgba(244,239,230,0.95);
      border: 1px solid rgba(255,255,255,0.32);
    }

    .glass-btn:hover,
    .solid-btn:hover {
      transform: translateY(-2px) scale(1.015);
    }

    .bottom-mark {
      position: absolute;
      left: 50%;
      bottom: 1rem;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: rgba(244, 239, 230, 0.42);
    }
  </style>
</head>

<body>
  <main class="hero">
    <div class="hero-inner">
      <div class="eyebrow">Photography Portfolio</div>

      <div class="brand-row">
        <div class="brand-main">CLEARSHOT</div>
        <div class="raw-glass">RAW</div>
      </div>

      <p class="tagline">Your vision, but better.</p>

      <div class="button-row">
        <a href="pictures.html" class="glass-btn">Pictures</a>
        <a href="booking.html" class="solid-btn">Booking</a>
      </div>
    </div>
  </main>

  <div class="bottom-mark">© 2026 CLEARSHOT RAW</div>
</body>
</html>
