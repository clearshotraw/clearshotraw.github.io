<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLEARSHOT RAW</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #0a0b0a;
      --bg-2: #111311;
      --bg-3: #171a18;
      --bg-4: #1c211e;

      --cream: #f4efe6;
      --soft-cream: rgba(244, 239, 230, 0.82);
      --muted-cream: rgba(244, 239, 230, 0.60);

      --sage: #a8b4a3;
      --sage-soft: rgba(168, 180, 163, 0.16);
      --sage-line: rgba(168, 180, 163, 0.28);

      --glass: rgba(255, 255, 255, 0.07);
      --glass-strong: rgba(255, 255, 255, 0.11);
      --glass-line: rgba(255, 255, 255, 0.15);
      --shadow: rgba(0, 0, 0, 0.32);
      --shadow-soft: rgba(0, 0, 0, 0.16);
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 16% 22%, rgba(244, 239, 230, 0.06), transparent 18%),
        radial-gradient(circle at 82% 78%, rgba(168, 180, 163, 0.10), transparent 22%),
        radial-gradient(circle at 78% 22%, rgba(244, 239, 230, 0.04), transparent 16%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 28%, var(--bg-3) 68%, var(--bg-4) 100%);
      position: relative;
      isolation: isolate;
    }

    .noise {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.045;
      background-image:
        radial-gradient(rgba(255,255,255,0.6) 0.45px, transparent 0.45px);
      background-size: 8px 8px;
      mix-blend-mode: soft-light;
      z-index: 0;
    }

    .ambient {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
      z-index: 0;
    }

    .ambient.a1 {
      width: 26rem;
      height: 26rem;
      top: -9rem;
      left: -7rem;
      background: rgba(244, 239, 230, 0.07);
    }

    .ambient.a2 {
      width: 22rem;
      height: 22rem;
      right: -6rem;
      bottom: -7rem;
      background: rgba(168, 180, 163, 0.12);
    }

    .ambient.a3 {
      width: 20rem;
      height: 20rem;
      right: 8rem;
      top: 3rem;
      background: rgba(255, 255, 255, 0.03);
      filter: blur(80px);
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 16px 40px rgba(0,0,0,0.14);
      pointer-events: none;
      z-index: 0;
    }

    .orb.o1 {
      width: 13rem;
      height: 13rem;
      top: -3rem;
      right: 6rem;
      opacity: 0.32;
    }

    .orb.o2 {
      width: 9rem;
      height: 9rem;
      bottom: 4rem;
      right: 9rem;
      opacity: 0.22;
    }

    .orb.o3 {
      width: 7rem;
      height: 7rem;
      left: -1rem;
      bottom: 3rem;
      opacity: 0.15;
      background: rgba(168, 180, 163, 0.07);
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      width: 100%;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .hero {
      width: min(100%, 72rem);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-inner {
      width: 100%;
      max-width: 62rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted-cream);
      margin-bottom: 1.3rem;
      text-align: center;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.25rem;
    }

    .brand-main {
      font-size: clamp(3.2rem, 8vw, 6.4rem);
      line-height: 0.95;
      font-weight: 650;
      letter-spacing: -0.055em;
      color: var(--cream);
      text-align: center;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.12);
    }

    .raw-glass {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 1.12em;
      padding: 0.12em 0.36em 0.16em;
      border-radius: 0.34em;
      position: relative;
      overflow: hidden;
      color: rgba(244, 239, 230, 0.97);
      font-size: clamp(3rem, 7vw, 5.8rem);
      line-height: 0.95;
      font-weight: 650;
      letter-spacing: -0.055em;
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        inset 0 -1px 0 rgba(255,255,255,0.04),
        0 18px 40px rgba(0,0,0,0.20),
        0 2px 10px rgba(255,255,255,0.03);
      text-align: center;
    }

    .raw-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(130deg, rgba(255,255,255,0.18), rgba(255,255,255,0.02) 42%, rgba(168,180,163,0.08) 100%);
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .raw-glass::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), transparent 38%, rgba(0,0,0,0.08) 100%);
      pointer-events: none;
    }

    .tagline {
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
      color: var(--soft-cream);
      font-weight: 400;
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 2rem;
    }

    .button-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.85rem;
      margin-bottom: 1.7rem;
    }

    .glass-btn,
    .solid-btn {
      appearance: none;
      border: none;
      outline: none;
      cursor: default;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 8.4rem;
      padding: 0.95rem 1.35rem;
      border-radius: 999px;
      font-size: 0.97rem;
      font-weight: 520;
      letter-spacing: -0.01em;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 14px 34px var(--shadow-soft);
      transition: transform 0.22s ease, opacity 0.22s ease, box-shadow 0.22s ease;
    }

    .glass-btn {
      color: rgba(244, 239, 230, 0.92);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
    }

    .glass-btn::before,
    .solid-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02));
      pointer-events: none;
    }

    .solid-btn {
      color: #171817;
      background:
        linear-gradient(180deg, rgba(244,239,230,0.98), rgba(236,230,220,0.92));
      border: 1px solid rgba(255,255,255,0.32);
    }

    .glass-btn:hover,
    .solid-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 18px 42px rgba(0,0,0,0.22);
    }

    .bottom-mark {
      position: absolute;
      left: 50%;
      bottom: 1rem;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: rgba(244, 239, 230, 0.42);
      letter-spacing: 0.03em;
      white-space: nowrap;
      z-index: 2;
      text-align: center;
    }

    @media (max-width: 900px) {
      .brand-row {
        gap: 0.55rem;
      }

      .raw-glass {
        padding-left: 0.28em;
        padding-right: 0.28em;
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 1.25rem;
      }

      .eyebrow {
        margin-bottom: 1rem;
        letter-spacing: 0.24em;
      }

      .brand-row {
        flex-direction: row;
        gap: 0.45rem;
      }

      .tagline {
        margin-bottom: 1.5rem;
      }

      .button-row {
        gap: 0.7rem;
      }

      .glass-btn,
      .solid-btn {
        min-width: 7.5rem;
        padding: 0.88rem 1.15rem;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="ambient a1"></div>
  <div class="ambient a2"></div>
  <div class="ambient a3"></div>

  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>

  <div class="shell">
    <main class="hero">
      <div class="hero-inner">
        <div class="eyebrow">Photography Portfolio</div>

        <div class="brand-row">
          <div class="brand-main">CLEARSHOT</div>
          <div class="raw-glass">RAW</div>
        </div>

        <p class="tagline">Your vision, but better.</p>

        <div class="button-row">
          <button class="glass-btn" type="button">Pictures</button>
          <button class="solid-btn" type="button">Booking</button>
        </div>
      </div>
    </main>
  </div>

  <div class="bottom-mark">© 2026 CLEARSHOT RAW</div>
</body>
</html>
