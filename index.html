<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLEARSHOT RAW</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 25%, rgba(236, 195, 95, 0.65), transparent 22%),
        radial-gradient(circle at 35% 70%, rgba(190, 150, 70, 0.30), transparent 24%),
        radial-gradient(circle at 72% 30%, rgba(110, 130, 125, 0.22), transparent 26%),
        radial-gradient(circle at 85% 78%, rgba(140, 150, 145, 0.16), transparent 20%),
        linear-gradient(120deg, #0b0a10 0%, #15161b 35%, #233138 68%, #2c4148 100%);
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.45;
      pointer-events: none;
    }

    body::before {
      width: 520px;
      height: 520px;
      left: -120px;
      top: -60px;
      background: rgba(221, 181, 89, 0.18);
    }

    body::after {
      width: 460px;
      height: 460px;
      right: -120px;
      bottom: -100px;
      background: rgba(126, 145, 143, 0.14);
    }

    .blob {
      position: absolute;
      border-radius: 46% 54% 57% 43% / 42% 44% 56% 58%;
      background: rgba(255, 255, 255, 0.05);
      filter: blur(2px);
      pointer-events: none;
    }

    .blob-1 {
      width: 240px;
      height: 240px;
      top: -40px;
      right: 80px;
    }

    .blob-2 {
      width: 220px;
      height: 220px;
      bottom: -30px;
      right: 120px;
      background: rgba(255, 255, 255, 0.04);
    }

    .blob-3 {
      width: 180px;
      height: 180px;
      bottom: 40px;
      left: -40px;
      background: rgba(214, 176, 95, 0.10);
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      position: relative;
      z-index: 2;
    }

    .hero-content {
      max-width: 900px;
    }

    h1 {
      font-size: clamp(2.6rem, 7vw, 5rem);
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .raw-box {
      display: inline-block;
      background: rgba(255, 255, 255, 0.95);
      color: #6f623f;
      padding: 1px 10px 3px;
      border-radius: 8px;
      margin-left: 6px;
    }

    .tagline {
      font-size: clamp(1rem, 2vw, 1.4rem);
      color: rgba(255, 255, 255, 0.92);
      font-style: italic;
      font-weight: 700;
      margin-bottom: 22px;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .fake-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 104px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.95);
      color: #514833;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.98rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .footer {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.82);
      z-index: 2;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .hero {
        padding: 20px 16px;
      }

      .fake-button {
        min-width: 94px;
        padding: 11px 16px;
      }

      .raw-box {
        margin-left: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <main class="hero">
    <div class="hero-content">
      <h1>CLEARSHOT<span class="raw-box">RAW</span></h1>
      <p class="tagline">Your vision, but better.</p>

      <div class="button-row">
        <div class="fake-button">Pictures</div>
        <div class="fake-button">Booking</div>
      </div>
    </div>
  </main>

  <div class="footer">© 2026 CLEARSHOT RAW</div>
</body>
</html>
