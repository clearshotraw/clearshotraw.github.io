<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | CLEARSHOT RAW</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #0b0c0b;
      --bg-2: #121412;
      --bg-3: #181b19;
      --bg-4: #202521;

      --cream: #f4efe6;
      --soft-cream: rgba(244, 239, 230, 0.82);
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: "Inter", sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 20% 20%, rgba(244,239,230,0.08), transparent 25%),
        radial-gradient(circle at 80% 80%, rgba(168,180,163,0.08), transparent 25%),
        linear-gradient(135deg, var(--bg-1), var(--bg-4));
    }

    .page {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .topbar a {
      color: var(--cream);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    h1 {
      text-align: center;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      margin-bottom: 10px;
    }

    .subtext {
      text-align: center;
      color: var(--soft-cream);
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      position: relative;
      height: 220px;
      border-radius: 24px;
      display: flex;
      align-items: flex-end;
      padding: 20px;
      text-decoration: none;
      color: var(--cream);
      overflow: hidden;

      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(0,0,0,0.65), rgba(0,0,0,0.2));
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      filter: brightness(1.05);
    }

    .card-label {
      position: relative;
      z-index: 1;
      font-size: 1.5rem;
      font-weight: 700;
    }

    /* 🔥 YOUR IMAGE FILES */
    .sports {
      background-image: url("sports-previewone.png");
    }

    .events {
      background-image: url("events-previewone.png");
    }

    .cars {
      background-image: url("cars-previewone.png");
    }

    .portraits {
      background-image: url("portraits-previewone.png");
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="topbar">
      <a href="index.html">CLEARSHOT RAW</a>
      <a href="index.html">HOME</a>
    </div>

    <h1>Portfolio</h1>
    <p class="subtext">Choose a category</p>

    <div class="grid">
      <a href="#" class="card sports">
        <div class="card-label">SPORTS</div>
      </a>

      <a href="#" class="card events">
        <div class="card-label">EVENTS</div>
      </a>

      <a href="#" class="card cars">
        <div class="card-label">CARS</div>
      </a>

      <a href="#" class="card portraits">
        <div class="card-label">PORTRAITS</div>
      </a>
    </div>
  </div>
</body>
</html>
