<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | CLEARSHOT RAW</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #0b0c0b;
    }

    :root {
      --bg-1: #0b0c0b;
      --bg-2: #121412;
      --bg-3: #181b19;
      --bg-4: #202521;

      --cream: #f4efe6;
      --soft-cream: rgba(244, 239, 230, 0.82);
      --muted-cream: rgba(244, 239, 230, 0.56);

      --mx: 50%;
      --my: 50%;
    }

    body {
      min-height: 100dvh;
      font-family: "Inter", sans-serif;
      color: var(--cream);
      overflow-x: hidden;

      background:
        radial-gradient(circle at 20% 20%, rgba(244,239,230,0.08), transparent 25%),
        radial-gradient(circle at 80% 80%, rgba(168,180,163,0.08), transparent 25%),
        linear-gradient(135deg, var(--bg-1), var(--bg-4));
    }

    .page {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .topbar a {
      color: var(--cream);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    h1 {
      text-align: center;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      margin-bottom: 10px;
    }

    .subtext {
      text-align: center;
      color: var(--soft-cream);
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      height: 220px;
      border-radius: 24px;
      display: flex;
      align-items: flex-end;
      padding: 20px;
      text-decoration: none;
      color: var(--cream);

      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      transition: all 0.25s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.08);
    }

    .card-label {
      font-size: 1.5rem;
      font-weight: 700;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="topbar">
      <a href="index.html">CLEARSHOT RAW</a>
      <a href="index.html">Home</a>
    </div>

    <h1>Portfolio</h1>
    <p class="subtext">Choose a category</p>

    <div class="grid">
      <a href="sports.html" class="card">
        <div class="card-label">SPORTS</div>
      </a>

      <a href="events.html" class="card">
        <div class="card-label">EVENTS</div>
      </a>

      <a href="cars.html" class="card">
        <div class="card-label">CARS</div>
      </a>

      <a href="portraits.html" class="card">
        <div class="card-label">PORTRAITS</div>
      </a>
    </div>

  </div>
</body>
</html>
